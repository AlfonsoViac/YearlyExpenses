<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f3f1;
  --bg2: #eae9e6;
  --surface: #fff;
  --border: #ddd;
  --border2: #ccc;
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --green: #1a8c5b;
  --green-bg: #e6f5ee;
  --red: #c23a2e;
  --red-bg: #fdecea;
  --accent: #1a1a1a;
  --yellow: #d4930d;
  --yellow-bg: #fef7e6;
  --blue: #2b7cb5;
  --blue-bg: #e8f2fa;
  --pink: #b5436a;
  --pink-bg: #fce8ef;
  --teal: #1a8c7a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  font-family: 'Instrument Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}
.mono { font-family: 'JetBrains Mono', monospace; }
.container { max-width: 1120px; margin: 0 auto; padding: 0 28px; }

/* Header */
.header {
  padding: 40px 0 6px;
  display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  border-bottom: 2px solid var(--text);
  margin-bottom: 24px;
  padding-bottom: 12px;
}
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
.header .sub { font-family: 'JetBrains Mono',monospace; font-size: 12px; color: var(--text3); letter-spacing: 1px; }

/* Month bar */
.month-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 20px; }
.month-btn {
  padding: 7px 14px; border: 1.5px solid transparent; border-radius: 6px;
  background: transparent; color: var(--text3); font-family: 'JetBrains Mono',monospace;
  font-size: 12px; cursor: pointer; transition: all .15s; position: relative;
}
.month-btn:hover { color: var(--text); background: var(--bg2); }
.month-btn.active { border-color: var(--text); color: var(--text); background: var(--surface); font-weight: 700; }
.month-btn .dot { position: absolute; top: 2px; right: 2px; width: 5px; height: 5px; border-radius: 50%; background: var(--green); }

/* Save bar */
.save-bar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
  padding: 12px 18px; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 10px;
}
.save-bar .save-text { flex:1; font-size: 13px; color: var(--text2); }
.save-bar .save-text strong { color: var(--text); }
.save-bar .unsaved { color: var(--yellow); font-weight: 600; font-size: 12px; }

/* Income Section */
.income-section {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 18px 22px; margin-bottom: 16px;
  display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
}
.income-section .field { display: flex; flex-direction: column; gap: 4px; }
.income-section label {
  font-size: 10px; font-family: 'JetBrains Mono',monospace; color: var(--text3);
  letter-spacing: 1.5px; text-transform: uppercase;
}
.income-section input[type="number"] {
  background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px;
  padding: 10px 14px; color: var(--green); font-family: 'JetBrains Mono',monospace; font-size: 15px;
  font-weight: 700; width: 180px; outline: none; transition: border-color .2s;
}
.income-section input[type="number"]:focus { border-color: var(--green); }
.income-total {
  margin-left: auto; text-align: right;
}
.income-total .lbl { font-size: 10px; font-family: 'JetBrains Mono',monospace; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }
.income-total .val { font-family: 'JetBrains Mono',monospace; font-size: 24px; font-weight: 700; color: var(--green); }

/* Summary row */
.summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
@media (max-width: 700px) { .summary-row { grid-template-columns: 1fr 1fr; } }
.summary-card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 14px 16px;
}
.summary-card .label { font-size: 10px; font-family: 'JetBrains Mono',monospace; color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 4px; }
.summary-card .value { font-family: 'JetBrains Mono',monospace; font-size: 18px; font-weight: 700; }

/* Filter tabs */
.tabs { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 12px; }
.tab-btn {
  padding: 5px 12px; border: 1.5px solid transparent; border-radius: 6px;
  background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; transition: all .15s;
}
.tab-btn:hover { color: var(--text2); background: var(--bg2); }
.tab-btn.active { border-color: var(--text); background: var(--surface); color: var(--text); font-weight: 600; }

/* Actions */
.actions-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.btn {
  padding: 9px 18px; border: none; border-radius: 8px;
  font-family: 'Instrument Sans',sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
}
.btn-primary { background: var(--text); color: #fff; }
.btn-primary:hover { background: #333; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #157a4e; }
.btn-ghost { background: var(--surface); border: 1.5px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--text); color: var(--text); }
.btn-sm { padding: 6px 14px; font-size: 12px; }

/* Table */
.table-wrap {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
  overflow-x: auto; margin-bottom: 20px;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left; padding: 10px 8px; font-size: 10px; font-family: 'JetBrains Mono',monospace;
  color: var(--text3); letter-spacing: 1px; text-transform: uppercase; border-bottom: 1.5px solid var(--border);
  white-space: nowrap; font-weight: 500;
}
tbody tr { border-bottom: 1px solid #eee; transition: background .1s; }
tbody tr:hover { background: #fafaf8; }
tbody td { padding: 6px 8px; vertical-align: middle; }
td input[type="text"], td input[type="number"], td input[type="date"] {
  background: transparent; border: none; color: var(--text); font-family: 'Instrument Sans',sans-serif;
  font-size: 13px; width: 100%; outline: none; padding: 4px 0;
}
td input[type="number"] { font-family: 'JetBrains Mono',monospace; font-weight: 600; }
td input[type="date"] { font-family: 'JetBrains Mono',monospace; font-size: 11px; color: var(--text2); }
td input:focus { border-bottom: 1.5px solid var(--text); }
td select {
  background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); font-size: 11px; padding: 3px 5px; cursor: pointer; outline: none;
}
td select:focus { border-color: var(--text); }
.cb { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; }
tfoot td { border-top: 2px solid var(--text); padding: 10px 8px; }

/* Dashboard */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
@media (max-width: 700px) { .dash-grid { grid-template-columns: 1fr; } }
.card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 18px;
}
.card-title {
  font-size: 10px; font-family: 'JetBrains Mono',monospace; color: var(--text3);
  letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px;
}
.donut-wrap { display: flex; justify-content: center; }
.bar-row { margin-bottom: 10px; }
.bar-row-head { display: flex; justify-content: space-between; margin-bottom: 3px; font-size: 13px; }
.bar-row-head .amt { font-family: 'JetBrains Mono',monospace; color: var(--text2); font-size: 12px; }
.bar-track { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* Averages section */
.avg-section { margin-top: 24px; }
.avg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.avg-card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px;
}
.avg-card .cat-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.avg-card .cat-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.avg-card .avg-vals { font-family: 'JetBrains Mono',monospace; font-size: 12px; color: var(--text2); }
.avg-card .avg-vals span { display: block; margin-bottom: 2px; }
.avg-card .spark { display: flex; align-items: flex-end; gap: 2px; height: 28px; margin-top: 6px; }
.avg-card .spark div { width: 6px; border-radius: 2px; transition: height .3s; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.3); display: flex;
  align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px);
}
.modal {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px;
  padding: 24px; width: 420px; max-width: 90vw; max-height: 80vh; overflow-y: auto;
}
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
.modal .cat-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
.modal .cat-row input[type="text"] {
  flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px;
  padding: 8px 12px; color: var(--text); font-size: 13px; outline: none;
}
.modal .cat-row input[type="text"]:focus { border-color: var(--text); }
.modal .cat-row input[type="color"] { width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; background: transparent; padding: 2px; }
.modal .cat-row .del-cat { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; padding: 4px 8px; opacity: .4; }
.modal .cat-row .del-cat:hover { opacity: 1; }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MONTH_FULL = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const CAT_COLORS = ["#c23a2e","#d4930d","#1a8c7a","#5b52cc","#b5436a","#2b7cb5","#d06b2e","#1a8c5b","#888","#9c5bbf","#3a9ec2","#8fb52b"];

let state = {
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear(),
  filter: "all",
  showCatModal: false,
  dirty: false,
  categories: [
    {name:"Home",color:"#c23a2e"},{name:"Mandado",color:"#d4930d"},{name:"Health",color:"#1a8c7a"},
    {name:"Gym",color:"#5b52cc"},{name:"Muchacha",color:"#b5436a"},{name:"Utilities",color:"#2b7cb5"},
    {name:"Entertainment",color:"#d06b2e"},{name:"Gasolina/Ubers",color:"#9c5bbf"},
    {name:"Creditos",color:"#3a9ec2"},{name:"Income",color:"#1a8c5b"},
  ],
  monthData: {},
};

function mk(m,y){return`${y}-${String(m).padStart(2,'0')}`;}
function cur(){return mk(state.currentMonth,state.currentYear);}
function getData(){
  if(!state.monthData[cur()])state.monthData[cur()]={income1:0,income2:0,rows:[]};
  return state.monthData[cur()];
}
function save(){
  try{localStorage.setItem('expense-tracker-v3',JSON.stringify({categories:state.categories,monthData:state.monthData}));}catch(e){}
  state.dirty=false;
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('expense-tracker-v3'));
    if(d){if(d.categories)state.categories=d.categories;if(d.monthData)state.monthData=d.monthData;}
  }catch(e){}
}
function markDirty(){state.dirty=true;}

function savedMonths(){
  return Object.keys(state.monthData).filter(k=>{const d=state.monthData[k];return d.income1||d.income2||d.rows.length;});
}

// ---- AVERAGES ----
function calcAverages(){
  const keys=savedMonths();
  if(!keys.length)return{monthly:{},yearly:{},totalMonths:0,catSparks:{}};
  const catMonthly={};
  const catSparks={};
  let grandTotal=0;
  keys.forEach(k=>{
    const d=state.monthData[k];
    d.rows.forEach(r=>{
      if(r.amount<0&&r.category&&r.category!=='Income'){
        const a=Math.abs(r.amount);
        catMonthly[r.category]=(catMonthly[r.category]||0)+a;
        grandTotal+=a;
      }
    });
  });
  // Sparks per cat per month
  state.categories.forEach(c=>{
    catSparks[c.name]=keys.map(k=>{
      const d=state.monthData[k];
      return d.rows.filter(r=>r.amount<0&&r.category===c.name).reduce((s,r)=>s+Math.abs(r.amount),0);
    });
  });
  const n=keys.length;
  const monthly={};const yearly={};
  Object.entries(catMonthly).forEach(([cat,total])=>{
    monthly[cat]=Math.round(total/n);
    yearly[cat]=Math.round(total/n*12);
  });
  return{monthly,yearly,totalMonths:n,grandMonthly:Math.round(grandTotal/n),grandYearly:Math.round(grandTotal/n*12),catSparks};
}

// ---- RENDER ----
function render(){
  const data=getData();
  const totalIncome=(parseFloat(data.income1)||0)+(parseFloat(data.income2)||0);
  const totalExpenses=data.rows.reduce((s,r)=>s+(r.amount<0?Math.abs(r.amount):0),0);
  const balance=totalIncome-totalExpenses;
  const rows=filterRows(data.rows);
  const pct=totalIncome>0?Math.round(totalExpenses/totalIncome*100):0;

  const catTotals={};
  data.rows.forEach(r=>{if(r.amount<0&&r.category&&r.category!=='Income'){catTotals[r.category]=(catTotals[r.category]||0)+Math.abs(r.amount);}});
  const catEntries=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const maxCat=catEntries.length?catEntries[0][1]:0;

  const cashT=data.rows.filter(r=>r.amount<0&&r.cashCredit==='Cash').reduce((s,r)=>s+Math.abs(r.amount),0);
  const credT=data.rows.filter(r=>r.amount<0&&r.cashCredit==='Credit').reduce((s,r)=>s+Math.abs(r.amount),0);
  const fijoT=data.rows.filter(r=>r.amount<0&&r.tipo==='Fijo').reduce((s,r)=>s+Math.abs(r.amount),0);
  const varT=data.rows.filter(r=>r.amount<0&&r.tipo==='Variable').reduce((s,r)=>s+Math.abs(r.amount),0);

  const sKeys=savedMonths();
  const avgs=calcAverages();

  document.getElementById('app').innerHTML=`
    <div class="header">
      <h1>${MONTH_FULL[state.currentMonth]} ${state.currentYear}</h1>
      <span class="sub">EXPENSE TRACKER</span>
    </div>

    <div class="month-bar">
      ${MONTHS.map((m,i)=>{
        const k=mk(i,state.currentYear);
        const has=sKeys.includes(k);
        return`<button class="month-btn ${state.currentMonth===i?'active':''}" onclick="switchMonth(${i})">${m}${has?'<span class="dot"></span>':''}</button>`;
      }).join('')}
    </div>

    <!-- Save bar -->
    <div class="save-bar">
      <div class="save-text">
        <strong>${MONTH_FULL[state.currentMonth]}</strong> — ${data.rows.length} movimiento${data.rows.length!==1?'s':''}
        ${state.dirty?'<span class="unsaved"> • Sin guardar</span>':''}
      </div>
      <button class="btn btn-green btn-sm" onclick="saveMonth()">Guardar ${MONTHS[state.currentMonth]}</button>
    </div>

    <div class="income-section">
      <div class="field">
        <label>Nómina Primera</label>
        <input type="number" id="inc1" value="${data.income1||''}" placeholder="0" oninput="updateIncome()">
      </div>
      <div class="field">
        <label>Nómina Segunda</label>
        <input type="number" id="inc2" value="${data.income2||''}" placeholder="0" oninput="updateIncome()">
      </div>
      <div class="income-total">
        <div class="lbl">Ingreso Total</div>
        <div class="val">$${totalIncome.toLocaleString()}</div>
      </div>
    </div>

    <div class="summary-row">
      <div class="summary-card"><div class="label">Ingreso</div><div class="value" style="color:var(--green)">$${totalIncome.toLocaleString()}</div></div>
      <div class="summary-card"><div class="label">Gastos</div><div class="value" style="color:var(--red)">$${totalExpenses.toLocaleString()}</div></div>
      <div class="summary-card"><div class="label">Balance</div><div class="value" style="color:${balance>=0?'var(--green)':'var(--red)'}">$${balance.toLocaleString()}</div></div>
      <div class="summary-card"><div class="label">% Gastado</div><div class="value" style="color:${pct>80?'var(--red)':pct>50?'var(--yellow)':'var(--green)'}">${pct}%</div></div>
    </div>

    <div class="tabs">
      ${[['all','Todos'],['not-done','Sin Marcar'],['primera','Primera'],['segunda','Segunda'],['cash','Cash'],['credit','Credit'],['fijo','Fijos'],['variable','Variables'],['expenses','Solo Gastos']].map(([f,l])=>`<button class="tab-btn ${state.filter===f?'active':''}" onclick="setFilter('${f}')">${l}</button>`).join('')}
    </div>

    <div class="actions-bar">
      <button class="btn btn-primary btn-sm" onclick="addRow()">+ Agregar Gasto</button>
      <button class="btn btn-ghost btn-sm" onclick="openCatModal()">Categorías</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:28px">✓</th><th>Concepto</th><th style="width:110px">Monto</th>
          <th style="width:115px">Fecha</th><th>Categoría</th><th style="width:85px">Quincena</th>
          <th style="width:75px">Pago</th><th style="width:75px">Tipo</th><th>Comentario</th><th style="width:30px"></th>
        </tr></thead>
        <tbody>
          ${rows.length===0?'<tr><td colspan="10" style="text-align:center;padding:28px;color:var(--text3);font-size:13px">Sin movimientos. Haz clic en "+ Agregar Gasto".</td></tr>':''}
          ${rows.map(r=>{
            const ri=data.rows.indexOf(r);
            return`<tr>
              <td><input type="checkbox" class="cb" ${r.done?'checked':''} onchange="toggleDone(${ri})"></td>
              <td><input type="text" value="${esc(r.concepto)}" onchange="updateRow(${ri},'concepto',this.value)" placeholder="Nombre..."></td>
              <td><input type="number" value="${r.amount||''}" onchange="updateRow(${ri},'amount',parseFloat(this.value)||0)" placeholder="-0.00" style="color:${r.amount>=0?'var(--green)':'var(--red)'}"></td>
              <td><input type="date" value="${r.date||''}" onchange="updateRow(${ri},'date',this.value)"></td>
              <td><select onchange="updateRow(${ri},'category',this.value)"><option value="">—</option>${state.categories.map(c=>`<option value="${esc(c.name)}" ${r.category===c.name?'selected':''}>${c.name}</option>`).join('')}</select></td>
              <td><select onchange="updateRow(${ri},'quincena',this.value)"><option value="">—</option><option value="Primera" ${r.quincena==='Primera'?'selected':''}>1ra</option><option value="Segunda" ${r.quincena==='Segunda'?'selected':''}>2da</option></select></td>
              <td><select onchange="updateRow(${ri},'cashCredit',this.value)"><option value="">—</option><option value="Cash" ${r.cashCredit==='Cash'?'selected':''}>Cash</option><option value="Credit" ${r.cashCredit==='Credit'?'selected':''}>Credit</option></select></td>
              <td><select onchange="updateRow(${ri},'tipo',this.value)"><option value="">—</option><option value="Fijo" ${r.tipo==='Fijo'?'selected':''}>Fijo</option><option value="Variable" ${r.tipo==='Variable'?'selected':''}>Variable</option></select></td>
              <td><input type="text" value="${esc(r.comment||'')}" onchange="updateRow(${ri},'comment',this.value)" placeholder="Nota..."></td>
              <td><button style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;opacity:.35" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.35" onclick="deleteRow(${ri})">✕</button></td>
            </tr>`;
          }).join('')}
        </tbody>
        ${rows.length?`<tfoot><tr>
          <td></td><td style="font-weight:700;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:1px">TOTAL</td>
          <td class="mono" style="font-weight:700;font-size:13px;color:${rows.reduce((s,r)=>s+r.amount,0)>=0?'var(--green)':'var(--red)'}">$${rows.reduce((s,r)=>s+r.amount,0).toLocaleString()}</td>
          <td colspan="7"></td>
        </tr></tfoot>`:''}
      </table>
    </div>

    <!-- Dashboard -->
    <div class="dash-grid">
      <div class="card">
        <div class="card-title">Desglose por Categoría</div>
        <div class="donut-wrap">${totalExpenses>0?buildDonut(catTotals,totalExpenses):'<div style="color:var(--text3);padding:40px 0;font-size:13px">Sin gastos</div>'}</div>
      </div>
      <div class="card">
        <div class="card-title">Gastos por Categoría</div>
        ${catEntries.length?catEntries.map(([cat,amt])=>{
          const co=state.categories.find(c=>c.name===cat);
          const color=co?co.color:'#888';
          return`<div class="bar-row"><div class="bar-row-head"><span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block"></span>${cat}</span><span class="amt">$${amt.toLocaleString()}</span></div><div class="bar-track"><div class="bar-fill" style="width:${amt/maxCat*100}%;background:${color};opacity:.75"></div></div></div>`;
        }).join(''):'<div style="color:var(--text3);font-size:13px">Sin datos</div>'}
      </div>
      <div class="card">
        <div class="card-title">Cash vs Credit</div>
        ${totalExpenses>0?`
          <div style="display:flex;gap:16px;margin-bottom:12px">
            <div style="flex:1"><div style="font-size:11px;color:var(--green);margin-bottom:2px;font-weight:600">Cash</div><div class="mono" style="font-size:18px;font-weight:700">$${cashT.toLocaleString()}</div></div>
            <div style="flex:1"><div style="font-size:11px;color:var(--pink);margin-bottom:2px;font-weight:600">Credit</div><div class="mono" style="font-size:18px;font-weight:700">$${credT.toLocaleString()}</div></div>
          </div>
          <div class="bar-track" style="height:10px;border-radius:5px;display:flex;overflow:hidden">
            <div style="width:${totalExpenses>0?cashT/totalExpenses*100:50}%;background:var(--green);height:100%"></div>
            <div style="width:${totalExpenses>0?credT/totalExpenses*100:50}%;background:var(--pink);height:100%"></div>
          </div>`:'<div style="color:var(--text3);font-size:13px">Sin datos</div>'}
      </div>
      <div class="card">
        <div class="card-title">Fijo vs Variable</div>
        ${totalExpenses>0?`
          <div style="display:flex;gap:16px;margin-bottom:12px">
            <div style="flex:1"><div style="font-size:11px;color:var(--blue);margin-bottom:2px;font-weight:600">Fijo</div><div class="mono" style="font-size:18px;font-weight:700">$${fijoT.toLocaleString()}</div></div>
            <div style="flex:1"><div style="font-size:11px;color:var(--yellow);margin-bottom:2px;font-weight:600">Variable</div><div class="mono" style="font-size:18px;font-weight:700">$${varT.toLocaleString()}</div></div>
          </div>
          <div class="bar-track" style="height:10px;border-radius:5px;display:flex;overflow:hidden">
            <div style="width:${totalExpenses>0?fijoT/totalExpenses*100:50}%;background:var(--blue);height:100%"></div>
            <div style="width:${totalExpenses>0?varT/totalExpenses*100:50}%;background:var(--yellow);height:100%"></div>
          </div>`:'<div style="color:var(--text3);font-size:13px">Sin datos</div>'}
      </div>
    </div>

    <!-- Averages Section -->
    ${avgs.totalMonths>=1?`
    <div class="avg-section">
      <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:14px;border-bottom:1.5px solid var(--border);padding-bottom:8px">
        <div style="font-size:16px;font-weight:700">Promedios</div>
        <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">${avgs.totalMonths} mes${avgs.totalMonths!==1?'es':''} guardado${avgs.totalMonths!==1?'s':''}</div>
      </div>
      <div class="summary-row" style="margin-bottom:14px">
        <div class="summary-card"><div class="label">Promedio Mensual</div><div class="value" style="color:var(--red)">$${(avgs.grandMonthly||0).toLocaleString()}</div></div>
        <div class="summary-card"><div class="label">Proyección Anual</div><div class="value" style="color:var(--red)">$${(avgs.grandYearly||0).toLocaleString()}</div></div>
      </div>
      <div class="avg-grid">
        ${Object.entries(avgs.monthly).sort((a,b)=>b[1]-a[1]).map(([cat,mAvg])=>{
          const co=state.categories.find(c=>c.name===cat);
          const color=co?co.color:'#888';
          const sparks=avgs.catSparks[cat]||[];
          const sparkMax=Math.max(...sparks,1);
          return`<div class="avg-card">
            <div class="cat-name"><span class="cat-dot" style="background:${color}"></span>${cat}</div>
            <div class="avg-vals">
              <span>Mensual: $${mAvg.toLocaleString()}</span>
              <span>Anual: $${(avgs.yearly[cat]||0).toLocaleString()}</span>
            </div>
            ${sparks.length>1?`<div class="spark">${sparks.map(v=>`<div style="height:${Math.max(v/sparkMax*28,2)}px;background:${color};opacity:.6"></div>`).join('')}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`:''}

    ${state.showCatModal?renderCatModal():''}
  `;
}

function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function filterRows(rows){
  switch(state.filter){
    case'not-done':return rows.filter(r=>!r.done);
    case'primera':return rows.filter(r=>r.quincena==='Primera');
    case'segunda':return rows.filter(r=>r.quincena==='Segunda');
    case'cash':return rows.filter(r=>r.cashCredit==='Cash');
    case'credit':return rows.filter(r=>r.cashCredit==='Credit');
    case'fijo':return rows.filter(r=>r.tipo==='Fijo');
    case'variable':return rows.filter(r=>r.tipo==='Variable');
    case'expenses':return rows.filter(r=>r.amount<0);
    default:return rows;
  }
}

function buildDonut(catTotals,total){
  const size=200,cx=100,cy=100,r=72,sw=26;
  let cum=0;const entries=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  let paths='';
  entries.forEach(([cat,amt])=>{
    const frac=amt/total;const start=cum;cum+=frac;
    const gap=.006,s=start+gap,e=start+frac-gap;
    if(e<=s)return;
    const sa=s*2*Math.PI-Math.PI/2,ea=e*2*Math.PI-Math.PI/2;
    const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    const la=frac>.5?1:0;
    const co=state.categories.find(c=>c.name===cat);const color=co?co.color:'#888';
    paths+=`<path d="M ${x1} ${y1} A ${r} ${r} 0 ${la} 1 ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>`;
  });
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eae9e6" stroke-width="${sw}"/>
    ${paths}
    <text x="${cx}" y="${cy-6}" text-anchor="middle" fill="#999" style="font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:1px">GASTOS</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" fill="#1a1a1a" style="font-size:20px;font-family:'JetBrains Mono',monospace;font-weight:700">$${total.toLocaleString()}</text>
  </svg>`;
}

function renderCatModal(){
  return`<div class="modal-overlay" onclick="if(event.target===this)closeCatModal()">
    <div class="modal">
      <h2>Administrar Categorías</h2>
      ${state.categories.map((c,i)=>`
        <div class="cat-row">
          <input type="color" value="${c.color}" onchange="updateCat(${i},'color',this.value)">
          <input type="text" value="${esc(c.name)}" onchange="updateCat(${i},'name',this.value)">
          <button class="del-cat" onclick="deleteCat(${i})">✕</button>
        </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-ghost btn-sm" onclick="addCat()">+ Nueva</button>
        <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="closeCatModal()">Listo</button>
      </div>
    </div>
  </div>`;
}

// ---- ACTIONS ----
function switchMonth(m){
  if(state.dirty&&!confirm('Tienes cambios sin guardar. ¿Cambiar de mes?'))return;
  state.currentMonth=m;state.dirty=false;render();
}
function setFilter(f){state.filter=f;render();}
function saveMonth(){save();render();}

function updateIncome(){
  const d=getData();
  d.income1=parseFloat(document.getElementById('inc1').value)||0;
  d.income2=parseFloat(document.getElementById('inc2').value)||0;
  markDirty();
  clearTimeout(window._t);window._t=setTimeout(render,500);
}
function addRow(){
  const d=getData();
  const today=`${state.currentYear}-${String(state.currentMonth+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
  const day=new Date().getDate();
  d.rows.push({concepto:'',amount:0,date:today,category:'',quincena:day<=14?'Primera':'Segunda',cashCredit:'',tipo:'',comment:'',done:false});
  markDirty();render();
}
function updateRow(i,f,v){
  const d=getData();d.rows[i][f]=v;
  if(f==='date'&&v){const day=parseInt(v.split('-')[2]);d.rows[i].quincena=day<=14?'Primera':'Segunda';}
  markDirty();render();
}
function toggleDone(i){getData().rows[i].done=!getData().rows[i].done;markDirty();render();}
function deleteRow(i){getData().rows.splice(i,1);markDirty();render();}
function openCatModal(){state.showCatModal=true;render();}
function closeCatModal(){state.showCatModal=false;render();}
function addCat(){
  state.categories.push({name:'Nueva',color:CAT_COLORS[state.categories.length%CAT_COLORS.length]});
  save();render();openCatModal();
}
function updateCat(i,f,v){state.categories[i][f]=v;save();render();openCatModal();}
function deleteCat(i){state.categories.splice(i,1);save();render();openCatModal();}

load();render();
</script>
