<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d1a;
  --bg2: #131328;
  --surface: rgba(255,255,255,0.03);
  --surface2: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #e0e0e0;
  --text2: #888;
  --text3: #555;
  --accent: #6C63FF;
  --accent2: #4834d4;
  --green: #2ECC71;
  --red: #E8453C;
  --yellow: #F7A928;
  --pink: #FF6B9D;
  --teal: #3CB4A0;
  --blue: #45B7D1;
  --orange: #FF8C42;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 40%, #1a0a2e 100%);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}
.mono { font-family: 'Space Mono', monospace; }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

/* Header */
.header { padding: 32px 0 8px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
.header h1 {
  font-size: 30px; font-weight: 700; letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 30%, var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header .year { font-family: 'Space Mono',monospace; font-size: 13px; color: var(--accent); letter-spacing: 2px; }

/* Month bar */
.month-bar { display: flex; gap: 5px; flex-wrap: wrap; margin: 16px 0 24px; }
.month-btn {
  padding: 7px 13px; border: 1px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--text3); font-family: 'Space Mono',monospace;
  font-size: 12px; cursor: pointer; transition: all .2s; position: relative;
}
.month-btn:hover { border-color: var(--accent); color: var(--text2); }
.month-btn.active { border-color: var(--accent); background: rgba(108,99,255,.12); color: #fff; }
.month-btn .dot { position: absolute; top: 3px; right: 3px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

/* Income Section */
.income-section {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 16px;
  padding: 20px 24px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
}
.income-section .field { display: flex; flex-direction: column; gap: 4px; }
.income-section label { font-size: 11px; font-family: 'Space Mono',monospace; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }
.income-section input {
  background: rgba(255,255,255,.05); border: 1px solid var(--border2); border-radius: 8px;
  padding: 10px 14px; color: var(--green); font-family: 'Space Mono',monospace; font-size: 16px;
  font-weight: 700; width: 180px; outline: none; transition: border-color .2s;
}
.income-section input:focus { border-color: var(--green); }
.income-section .total-income {
  font-family: 'Space Mono',monospace; font-size: 22px; font-weight: 700;
  color: var(--green); margin-left: auto; display: flex; align-items: center; gap: 8px;
}
.income-section .total-income span { font-size: 11px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }

/* Filter tabs */
.tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
.tab-btn {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; transition: all .2s;
}
.tab-btn:hover { border-color: var(--border2); color: var(--text2); }
.tab-btn.active { border-color: var(--accent); background: rgba(108,99,255,.1); color: #fff; }

/* Expense Table */
.table-wrap {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  overflow-x: auto; margin-bottom: 20px;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left; padding: 12px 10px; font-size: 11px; font-family: 'Space Mono',monospace;
  color: var(--text3); letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border);
  white-space: nowrap; font-weight: 400;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
tbody tr:hover { background: rgba(255,255,255,.02); }
tbody td { padding: 8px 10px; vertical-align: middle; }
td input[type="text"], td input[type="number"], td input[type="date"] {
  background: transparent; border: none; color: var(--text); font-family: 'DM Sans',sans-serif;
  font-size: 13px; width: 100%; outline: none; padding: 4px 0;
}
td input[type="number"] { font-family: 'Space Mono',monospace; font-weight: 700; color: var(--red); }
td input[type="date"] { font-family: 'Space Mono',monospace; font-size: 12px; color: var(--text2); }
td input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.5); }
td input:focus { border-bottom: 1px solid var(--accent); }

/* Selects */
td select {
  background: rgba(255,255,255,.05); border: 1px solid transparent; border-radius: 6px;
  color: var(--text); font-size: 12px; padding: 4px 6px; cursor: pointer; outline: none;
  font-family: 'DM Sans',sans-serif;
}
td select:focus { border-color: var(--accent); }

/* Checkbox */
.cb { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

/* Category tags */
.cat-tag {
  display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px;
  font-weight: 600; white-space: nowrap;
}

/* Buttons */
.btn {
  padding: 10px 20px; border: none; border-radius: 10px; font-family: 'DM Sans',sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 16px rgba(108,99,255,.25); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(108,99,255,.35); }
.btn-ghost { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { border-color: var(--accent); color: #fff; }
.btn-danger { background: rgba(232,69,60,.15); border: 1px solid rgba(232,69,60,.3); color: var(--red); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.actions-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }

/* Dashboard Grid */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 28px; }
@media (max-width: 700px) { .dash-grid { grid-template-columns: 1fr; } }
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px;
}
.card-title {
  font-size: 11px; font-family: 'Space Mono',monospace; color: var(--text3);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
}

/* Donut */
.donut-wrap { display: flex; justify-content: center; }

/* Bar rows */
.bar-row { margin-bottom: 12px; }
.bar-row-head { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
.bar-row-head .amt { font-family: 'Space Mono',monospace; color: var(--text2); font-size: 12px; }
.bar-track { height: 6px; background: #1a1a2e; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* Summary cards */
.summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
@media (max-width: 700px) { .summary-row { grid-template-columns: 1fr 1fr; } }
.summary-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 16px; text-align: center;
}
.summary-card .label { font-size: 10px; font-family: 'Space Mono',monospace; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.summary-card .value { font-family: 'Space Mono',monospace; font-size: 20px; font-weight: 700; }

/* Category manager modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex;
  align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px);
}
.modal {
  background: #1a1a30; border: 1px solid var(--border2); border-radius: 20px;
  padding: 28px; width: 440px; max-width: 90vw; max-height: 80vh; overflow-y: auto;
}
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal .cat-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.modal .cat-row input[type="text"] {
  flex: 1; background: rgba(255,255,255,.05); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none;
}
.modal .cat-row input[type="color"] { width: 36px; height: 36px; border: none; border-radius: 8px; cursor: pointer; background: transparent; }
.modal .cat-row .del-cat { background: none; border: none; color: var(--red); cursor: pointer; font-size: 18px; padding: 4px 8px; opacity: .6; }
.modal .cat-row .del-cat:hover { opacity: 1; }

/* Quincena pills */
.pill {
  display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 600;
}
.pill-primera { background: rgba(255,167,40,.15); color: var(--yellow); }
.pill-segunda { background: rgba(60,180,160,.15); color: var(--teal); }
.pill-cash { background: rgba(46,204,113,.12); color: var(--green); }
.pill-credit { background: rgba(255,107,157,.12); color: var(--pink); }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
// ---- STATE ----
const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MONTH_FULL = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const CAT_COLORS = ["#E8453C","#F7A928","#3CB4A0","#6C63FF","#FF6B9D","#45B7D1","#FF8C42","#2ECC71","#95A5A6","#e056a0","#56c0e0","#c0e056"];

let state = {
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear(),
  filter: "all",
  showCatModal: false,
  categories: [
    { name:"Home", color:"#E8453C" },
    { name:"Mandado", color:"#F7A928" },
    { name:"Health", color:"#3CB4A0" },
    { name:"Gym", color:"#6C63FF" },
    { name:"Muchacha", color:"#FF6B9D" },
    { name:"Utilities", color:"#45B7D1" },
    { name:"Entertainment", color:"#FF8C42" },
    { name:"Gasolina/Ubers", color:"#e056a0" },
    { name:"Creditos", color:"#56c0e0" },
    { name:"Income", color:"#2ECC71" },
  ],
  // monthData keyed by "YYYY-MM" -> { income1, income2, rows:[] }
  monthData: {},
};

function key(m,y) { return `${y}-${String(m).padStart(2,'0')}`; }
function cur() { return key(state.currentMonth, state.currentYear); }
function getData() {
  if (!state.monthData[cur()]) state.monthData[cur()] = { income1:0, income2:0, rows:[] };
  return state.monthData[cur()];
}

function save() {
  try { localStorage.setItem('expense-tracker-v2', JSON.stringify({ categories: state.categories, monthData: state.monthData })); } catch(e){}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('expense-tracker-v2'));
    if (d) {
      if (d.categories) state.categories = d.categories;
      if (d.monthData) state.monthData = d.monthData;
    }
  } catch(e){}
}

// ---- RENDER ----
function render() {
  const data = getData();
  const totalIncome = (parseFloat(data.income1)||0) + (parseFloat(data.income2)||0);
  const totalExpenses = data.rows.reduce((s,r) => s + (r.amount < 0 ? Math.abs(r.amount) : 0), 0);
  const balance = totalIncome - totalExpenses;
  const rows = filterRows(data.rows);

  // Category breakdown (only expenses)
  const catTotals = {};
  data.rows.forEach(r => {
    if (r.amount < 0 && r.category && r.category !== 'Income') {
      catTotals[r.category] = (catTotals[r.category]||0) + Math.abs(r.amount);
    }
  });
  const catEntries = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  const maxCat = catEntries.length ? catEntries[0][1] : 0;

  // Cash vs Credit
  const cashTotal = data.rows.filter(r=>r.amount<0&&r.cashCredit==='Cash').reduce((s,r)=>s+Math.abs(r.amount),0);
  const creditTotal = data.rows.filter(r=>r.amount<0&&r.cashCredit==='Credit').reduce((s,r)=>s+Math.abs(r.amount),0);
  // Fijo vs Variable
  const fijoTotal = data.rows.filter(r=>r.amount<0&&r.tipo==='Fijo').reduce((s,r)=>s+Math.abs(r.amount),0);
  const varTotal = data.rows.filter(r=>r.amount<0&&r.tipo==='Variable').reduce((s,r)=>s+Math.abs(r.amount),0);

  // Saved months
  const savedKeys = Object.keys(state.monthData).filter(k => {
    const d = state.monthData[k];
    return d.income1 || d.income2 || d.rows.length;
  });

  const app = document.getElementById('app');
  app.innerHTML = `
    <!-- Header -->
    <div class="header">
      <h1>${MONTH_FULL[state.currentMonth]} ${state.currentYear}</h1>
      <span class="year mono">${state.currentYear}</span>
    </div>

    <!-- Month bar -->
    <div class="month-bar">
      ${MONTHS.map((m,i) => {
        const k = key(i, state.currentYear);
        const hasSaved = savedKeys.includes(k);
        return `<button class="month-btn ${state.currentMonth===i?'active':''}" onclick="switchMonth(${i})">${m}${hasSaved?'<span class="dot"></span>':''}</button>`;
      }).join('')}
    </div>

    <!-- Income Section -->
    <div class="income-section">
      <div class="field">
        <label>Nómina Primera</label>
        <input type="number" id="inc1" value="${data.income1||''}" placeholder="0" onchange="updateIncome()" oninput="updateIncome()">
      </div>
      <div class="field">
        <label>Nómina Segunda</label>
        <input type="number" id="inc2" value="${data.income2||''}" placeholder="0" onchange="updateIncome()" oninput="updateIncome()">
      </div>
      <div class="total-income">
        <span>Ingreso Total</span>
        $${totalIncome.toLocaleString()}
      </div>
    </div>

    <!-- Summary row -->
    <div class="summary-row">
      <div class="summary-card">
        <div class="label">Ingreso</div>
        <div class="value" style="color:#2ECC71">$${totalIncome.toLocaleString()}</div>
      </div>
      <div class="summary-card">
        <div class="label">Gastos</div>
        <div class="value" style="color:#E8453C">$${totalExpenses.toLocaleString()}</div>
      </div>
      <div class="summary-card">
        <div class="label">Balance</div>
        <div class="value" style="color:${balance>=0?'#2ECC71':'#E8453C'}">$${balance.toLocaleString()}</div>
      </div>
      <div class="summary-card">
        <div class="label">% Gastado</div>
        <div class="value" style="color:${totalIncome>0&&(totalExpenses/totalIncome)>.8?'#E8453C':'#F7A928'}">${totalIncome>0?Math.round(totalExpenses/totalIncome*100):0}%</div>
      </div>
    </div>

    <!-- Filter tabs -->
    <div class="tabs">
      ${[
        ['all','Todos'],
        ['not-done','Sin Marcar'],
        ['primera','Primera'],
        ['segunda','Segunda'],
        ['cash','Pagos Cash'],
        ['credit','Pagos Credit'],
        ['fijo','Gastos Fijos'],
        ['variable','Variables'],
        ['expenses','Solo Gastos'],
      ].map(([f,label]) => `<button class="tab-btn ${state.filter===f?'active':''}" onclick="setFilter('${f}')">${label}</button>`).join('')}
    </div>

    <!-- Actions -->
    <div class="actions-bar">
      <button class="btn btn-primary btn-sm" onclick="addRow()">+ Agregar Gasto</button>
      <button class="btn btn-ghost btn-sm" onclick="openCatModal()">⚙ Categorías</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:30px">✓</th>
            <th>Concepto</th>
            <th style="width:110px">Monto</th>
            <th style="width:120px">Fecha</th>
            <th>Categoría</th>
            <th style="width:90px">Quincena</th>
            <th style="width:80px">Pago</th>
            <th style="width:80px">Tipo</th>
            <th>Comentario</th>
            <th style="width:36px"></th>
          </tr>
        </thead>
        <tbody>
          ${rows.length === 0 ? `<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--text3)">No hay gastos. Haz clic en "+ Agregar Gasto" para empezar.</td></tr>` : ''}
          ${rows.map((r,i) => {
            const realIdx = data.rows.indexOf(r);
            const catObj = state.categories.find(c=>c.name===r.category);
            const catColor = catObj ? catObj.color : '#888';
            return `<tr>
              <td><input type="checkbox" class="cb" ${r.done?'checked':''} onchange="toggleDone(${realIdx})"></td>
              <td><input type="text" value="${esc(r.concepto)}" onchange="updateRow(${realIdx},'concepto',this.value)" placeholder="Nombre..."></td>
              <td><input type="number" value="${r.amount||''}" onchange="updateRow(${realIdx},'amount',parseFloat(this.value)||0)" placeholder="-0.00" style="color:${r.amount>=0?'var(--green)':'var(--red)'}"></td>
              <td><input type="date" value="${r.date||''}" onchange="updateRow(${realIdx},'date',this.value)"></td>
              <td>
                <select onchange="updateRow(${realIdx},'category',this.value)">
                  <option value="">—</option>
                  ${state.categories.map(c=>`<option value="${esc(c.name)}" ${r.category===c.name?'selected':''}>${c.name}</option>`).join('')}
                </select>
              </td>
              <td>
                <select onchange="updateRow(${realIdx},'quincena',this.value)">
                  <option value="">—</option>
                  <option value="Primera" ${r.quincena==='Primera'?'selected':''}>Primera</option>
                  <option value="Segunda" ${r.quincena==='Segunda'?'selected':''}>Segunda</option>
                </select>
              </td>
              <td>
                <select onchange="updateRow(${realIdx},'cashCredit',this.value)">
                  <option value="">—</option>
                  <option value="Cash" ${r.cashCredit==='Cash'?'selected':''}>Cash</option>
                  <option value="Credit" ${r.cashCredit==='Credit'?'selected':''}>Credit</option>
                </select>
              </td>
              <td>
                <select onchange="updateRow(${realIdx},'tipo',this.value)">
                  <option value="">—</option>
                  <option value="Fijo" ${r.tipo==='Fijo'?'selected':''}>Fijo</option>
                  <option value="Variable" ${r.tipo==='Variable'?'selected':''}>Variable</option>
                </select>
              </td>
              <td><input type="text" value="${esc(r.comment||'')}" onchange="updateRow(${realIdx},'comment',this.value)" placeholder="Nota..."></td>
              <td><button style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;opacity:.5" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5" onclick="deleteRow(${realIdx})">✕</button></td>
            </tr>`;
          }).join('')}
        </tbody>
        ${rows.length ? `<tfoot><tr>
          <td></td><td style="font-weight:700;font-size:12px;color:var(--text3)">TOTAL</td>
          <td style="font-family:'Space Mono',monospace;font-weight:700;font-size:13px;color:${rows.reduce((s,r)=>s+r.amount,0)>=0?'var(--green)':'var(--red)'}">
            $${rows.reduce((s,r)=>s+r.amount,0).toLocaleString()}
          </td>
          <td colspan="7"></td>
        </tr></tfoot>` : ''}
      </table>
    </div>

    <!-- Dashboard -->
    <div class="dash-grid">
      <!-- Donut -->
      <div class="card">
        <div class="card-title">Desglose por Categoría</div>
        <div class="donut-wrap">${totalExpenses > 0 ? buildDonut(catTotals, totalExpenses) : '<div style="color:var(--text3);text-align:center;padding:40px 0;font-size:13px">Agrega gastos para ver el desglose</div>'}</div>
      </div>

      <!-- Bars -->
      <div class="card">
        <div class="card-title">Gastos por Categoría</div>
        ${catEntries.length ? catEntries.map(([cat,amt]) => {
          const catObj = state.categories.find(c=>c.name===cat);
          const color = catObj ? catObj.color : '#888';
          return `<div class="bar-row">
            <div class="bar-row-head"><span>${cat}</span><span class="amt">$${amt.toLocaleString()}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${(amt/maxCat*100)}%;background:${color};opacity:.8"></div></div>
          </div>`;
        }).join('') : '<div style="color:var(--text3);font-size:13px">Sin datos</div>'}
      </div>

      <!-- Cash vs Credit -->
      <div class="card">
        <div class="card-title">Cash vs Credit</div>
        ${totalExpenses > 0 ? `
          <div style="display:flex;gap:16px;align-items:center;margin-bottom:12px">
            <div style="flex:1">
              <div style="font-size:12px;color:var(--green);margin-bottom:4px">Cash</div>
              <div class="mono" style="font-size:20px;font-weight:700">$${cashTotal.toLocaleString()}</div>
            </div>
            <div style="flex:1">
              <div style="font-size:12px;color:var(--pink);margin-bottom:4px">Credit</div>
              <div class="mono" style="font-size:20px;font-weight:700">$${creditTotal.toLocaleString()}</div>
            </div>
          </div>
          <div class="bar-track" style="height:10px;border-radius:5px;display:flex;overflow:hidden">
            <div style="width:${totalExpenses>0?cashTotal/totalExpenses*100:50}%;background:var(--green);height:100%"></div>
            <div style="width:${totalExpenses>0?creditTotal/totalExpenses*100:50}%;background:var(--pink);height:100%"></div>
          </div>
        ` : '<div style="color:var(--text3);font-size:13px">Sin datos</div>'}
      </div>

      <!-- Fijo vs Variable -->
      <div class="card">
        <div class="card-title">Fijo vs Variable</div>
        ${totalExpenses > 0 ? `
          <div style="display:flex;gap:16px;align-items:center;margin-bottom:12px">
            <div style="flex:1">
              <div style="font-size:12px;color:var(--blue);margin-bottom:4px">Fijo</div>
              <div class="mono" style="font-size:20px;font-weight:700">$${fijoTotal.toLocaleString()}</div>
            </div>
            <div style="flex:1">
              <div style="font-size:12px;color:var(--yellow);margin-bottom:4px">Variable</div>
              <div class="mono" style="font-size:20px;font-weight:700">$${varTotal.toLocaleString()}</div>
            </div>
          </div>
          <div class="bar-track" style="height:10px;border-radius:5px;display:flex;overflow:hidden">
            <div style="width:${totalExpenses>0?fijoTotal/totalExpenses*100:50}%;background:var(--blue);height:100%"></div>
            <div style="width:${totalExpenses>0?varTotal/totalExpenses*100:50}%;background:var(--yellow);height:100%"></div>
          </div>
        ` : '<div style="color:var(--text3);font-size:13px">Sin datos</div>'}
      </div>
    </div>

    ${state.showCatModal ? renderCatModal() : ''}
  `;
  save();
}

// ---- HELPERS ----
function esc(s) { return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function filterRows(rows) {
  switch(state.filter) {
    case 'not-done': return rows.filter(r=>!r.done);
    case 'primera': return rows.filter(r=>r.quincena==='Primera');
    case 'segunda': return rows.filter(r=>r.quincena==='Segunda');
    case 'cash': return rows.filter(r=>r.cashCredit==='Cash');
    case 'credit': return rows.filter(r=>r.cashCredit==='Credit');
    case 'fijo': return rows.filter(r=>r.tipo==='Fijo');
    case 'variable': return rows.filter(r=>r.tipo==='Variable');
    case 'expenses': return rows.filter(r=>r.amount<0);
    default: return rows;
  }
}

function buildDonut(catTotals, total) {
  const size=220, cx=size/2, cy=size/2, r=80, sw=30;
  let cum=0;
  const entries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  let paths = '';
  entries.forEach(([cat,amt])=>{
    const frac = amt/total;
    const start = cum;
    cum += frac;
    const gap=0.005, s=start+gap, e=start+frac-gap;
    if(e<=s) return;
    const sa=s*2*Math.PI-Math.PI/2, ea=e*2*Math.PI-Math.PI/2;
    const x1=cx+r*Math.cos(sa), y1=cy+r*Math.sin(sa);
    const x2=cx+r*Math.cos(ea), y2=cy+r*Math.sin(ea);
    const la=frac>.5?1:0;
    const catObj = state.categories.find(c=>c.name===cat);
    const color = catObj?catObj.color:'#888';
    paths += `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${la} 1 ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" style="filter:drop-shadow(0 0 6px ${color}44)"/>`;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1a1a2e" stroke-width="${sw}"/>
    ${paths}
    <text x="${cx}" y="${cy-8}" text-anchor="middle" fill="#888" style="font-size:11px;font-family:'Space Mono',monospace;letter-spacing:1px">GASTOS</text>
    <text x="${cx}" y="${cy+18}" text-anchor="middle" fill="#fff" style="font-size:22px;font-family:'Space Mono',monospace;font-weight:700">$${total.toLocaleString()}</text>
  </svg>`;
}

function renderCatModal() {
  return `<div class="modal-overlay" onclick="if(event.target===this)closeCatModal()">
    <div class="modal">
      <h2>Administrar Categorías</h2>
      <div id="cat-list">
        ${state.categories.map((c,i) => `
          <div class="cat-row">
            <input type="color" value="${c.color}" onchange="updateCat(${i},'color',this.value)">
            <input type="text" value="${esc(c.name)}" onchange="updateCat(${i},'name',this.value)" placeholder="Nombre...">
            <button class="del-cat" onclick="deleteCat(${i})">✕</button>
          </div>
        `).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn btn-ghost btn-sm" onclick="addCat()">+ Nueva Categoría</button>
        <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="closeCatModal()">Listo</button>
      </div>
    </div>
  </div>`;
}

// ---- ACTIONS ----
function switchMonth(m) { state.currentMonth = m; render(); }
function setFilter(f) { state.filter = f; render(); }

function updateIncome() {
  const d = getData();
  d.income1 = parseFloat(document.getElementById('inc1').value)||0;
  d.income2 = parseFloat(document.getElementById('inc2').value)||0;
  // Debounce heavy re-render, just save
  clearTimeout(window._incTimer);
  window._incTimer = setTimeout(()=>{ save(); render(); }, 400);
}

function addRow() {
  const d = getData();
  const today = `${state.currentYear}-${String(state.currentMonth+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
  const day = new Date().getDate();
  d.rows.push({
    concepto:'', amount:0, date:today, category:'', quincena: day<=14?'Primera':'Segunda',
    cashCredit:'', tipo:'', comment:'', done:false
  });
  render();
}

function updateRow(idx, field, val) {
  const d = getData();
  d.rows[idx][field] = val;
  // Auto-set quincena from date
  if (field === 'date' && val) {
    const day = parseInt(val.split('-')[2]);
    d.rows[idx].quincena = day <= 14 ? 'Primera' : 'Segunda';
  }
  render();
}

function toggleDone(idx) { const d=getData(); d.rows[idx].done=!d.rows[idx].done; render(); }
function deleteRow(idx) { const d=getData(); d.rows.splice(idx,1); render(); }

function openCatModal() { state.showCatModal=true; render(); }
function closeCatModal() { state.showCatModal=false; render(); }
function addCat() {
  const color = CAT_COLORS[state.categories.length % CAT_COLORS.length];
  state.categories.push({name:'Nueva', color});
  render(); openCatModal();
}
function updateCat(i,field,val) { state.categories[i][field]=val; save(); render(); openCatModal(); }
function deleteCat(i) { state.categories.splice(i,1); render(); openCatModal(); }

// ---- INIT ----
load();
render();
</script>
